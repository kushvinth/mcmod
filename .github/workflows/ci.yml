name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-shell:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Find and lint shell scripts
        run: |
          find . -type f \( -name "*.sh" -o -name "*.bash" -o -name ".zshrc" -o -name ".bashrc" -o -name "sketchybarrc" -o -name "skhdrc" \) \
            -not -path "./dot-claude/*" \
            -not -path "./.git/*" \
            -print0 | xargs -0 shellcheck --severity=warning || true

  lint-lua:
    name: Lint Lua Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Lua tools
        run: |
          sudo apt-get update
          sudo apt-get install -y luarocks
          cargo install stylua

      - name: Check Lua formatting with StyLua
        run: |
          stylua --check dot-config/nvim/ || echo "Lua formatting issues found"

  lint-yaml:
    name: Lint YAML Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          yamllint -d relaxed .github/ || true

  lint-markdown:
    name: Lint Markdown Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v24
        with:
          globs: "**/*.md"
          fix: false
        continue-on-error: true

  validate-nix:
    name: Validate Nix flake
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Flake check
        run: nix flake check ./nix

      - name: Build darwin configuration
        run: nix build ./nix#darwinConfigurations.MacbookPro.config.system.build.toplevel

  validate-brewfile:
    name: Validate Brewfile
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate Brewfile syntax
        run: |
          ruby -c Brewfile

  validate-stow:
    name: Validate Stow layout
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Stow
        run: sudo apt-get install -y stow

      - name: Dry-run stow from repo root
        run: |
          set -e
          HOME_TEST="$RUNNER_TEMP/home"
          mkdir -p "$HOME_TEST"
          stow -n -v --target="$HOME_TEST" --dotfiles .

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for potential secrets..."
          grep -rn --include="*.sh" --include="*.zsh" --include=".zshrc" \
            -E "(password|secret|api_key|token)[\s]*=[\s]*['\"][^'\"]+['\"]" . || echo "No hardcoded secrets found"
